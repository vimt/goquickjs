name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: differential corpus
        run: go test -count=1 ./internal/differ/
      - name: race detector
        run: go test -race -count=1 ./...
      - name: parser fuzz (60s smoke)
        run: go test -run '^$' -fuzz=FuzzParse -fuzztime=60s ./internal/parser
      - name: eval fuzz (30s smoke)
        run: go test -run '^$' -fuzz=FuzzEval -fuzztime=30s .
      - name: goroutine-leak regression
        run: go test -count=1 -run Leak .
